name: Morning Market Data Refresh Engine

on:
  schedule:
    # Executes daily at exactly 13:00 UTC (Which maps directly to 09:00 AM New York EST)
    - cron: '0 13 * * 1-5'
  workflow_dispatch: # Allows you to manually trigger it via the website dashboard anytime

jobs:
  refresh-levels:
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repository Code
        uses: actions/checkout@v3

      - name: Initialize Free Python Runtime Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System HTTP Transport Packages
        run: pip install yfinance

      - name: Run Pre-Market Scraper Execution
        run: python scraper.py
